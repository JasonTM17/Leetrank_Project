# codecov.yml — coverage gate for LeetRank
# Docs: https://docs.codecov.com/docs/codecov-yaml
#
# Status check policy:
#   - project: 80 % overall coverage, soft floor (informational drop budget)
#   - patch:   80 % on changed lines (hard gate — blocks the PR)
#
# We deliberately let "project" drift slowly while pinning "patch" hard,
# so feature branches can't lower the bar without explicit override.

coverage:
  precision: 2
  round: down
  range: "70...95"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_ci_failed: error
        only_pulls: false

    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error
        only_pulls: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: true

ignore:
  - "node_modules/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "tests/**"
  - "e2e/**"
  - "playwright-report/**"
  - "coverage/**"
  - "scripts/**"
  - "prisma/migrations/**"
  - "load-test-results/**"

flags:
  unittests:
    paths:
      - src/
    carryforward: true

github_checks:
  annotations: true
