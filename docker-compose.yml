services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set; copy .env.example to .env first}
      - JUDGE_SERVICE_URL=http://judge:9090
    volumes:
      - db_data:/app/data
    depends_on:
      judge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  judge:
    build:
      context: ./judge-service
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      - RUNNER_TIMEOUT=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
