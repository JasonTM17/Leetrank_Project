services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leetrank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leetrank-dev}
      POSTGRES_DB: ${POSTGRES_DB:-leetrank}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leetrank} -d ${POSTGRES_DB:-leetrank}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-leetrank-dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-leetrank-dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set; copy .env.example to .env first}
      - JUDGE_SERVICE_URL=http://judge:9090
      - REDIS_URL=${REDIS_URL:-redis://:leetrank-dev@redis:6379/0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - N8N_CHATBOT_WEBHOOK_URL=http://n8n:5678/webhook/leetrank-chatbot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - DATABASE_URL=${DATABASE_URL:-postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set; copy .env.example to .env first}
      - CORS_ALLOWED_ORIGINS=${API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Identity service (Go) — sole canonical auth issuer. Owns user accounts,
  # sessions, JWTs, and the Ed25519 keystore exposed via JWKS at
  # /.well-known/jwks.json. Replaced the legacy `apps/auth` (TS) service
  # once Ed25519 + JWKS landed here. See ADR 0027.
  identity:
    build:
      context: ./services/auth-go
      dockerfile: Dockerfile
    ports:
      - "4011:4011"
    environment:
      - AUTH_PORT=4011
      - DATABASE_URL=${DATABASE_URL:-postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CORS_ALLOWED_ORIGINS=${API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Distroless has no wget; use a TCP probe via the in-image Go binary.
    healthcheck:
      test: ["CMD", "/app/auth-go", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 512


  # Submissions service (Go) — accepts code submissions, dispatches to judge.
  submissions:
    build:
      context: ./services/submissions-go
      dockerfile: Dockerfile
    ports:
      - "4012:4012"
    environment:
      - SUBMISSIONS_PORT=4012
      - DATABASE_URL=${DATABASE_URL:-postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CORS_ALLOWED_ORIGINS=${API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/submissions-go", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 512

  # Problems read service (Go) — catalogue + tag listings.
  problems:
    build:
      context: ./services/problems-go
      dockerfile: Dockerfile
    ports:
      - "4013:4013"
    environment:
      - PROBLEMS_PORT=4013
      - DATABASE_URL=${DATABASE_URL:-postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public}
      - CORS_ALLOWED_ORIGINS=${API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/problems-go", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 512

  # Rust leaderboard service (port 4014). Reads `leaderboard:global` ZSET
  # from redis and serves paginated rankings; admin recompute pulls from pg.
  leaderboard-rust:
    build:
      context: ./services/leaderboard-rust
      dockerfile: Dockerfile
    ports:
      - "4014:4014"
    environment:
      - LEADERBOARD_PORT=4014
      - DATABASE_URL=${DATABASE_URL:-postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://:leetrank-dev@redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ADMIN_TOKEN=${LEADERBOARD_ADMIN_TOKEN:-}
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/leaderboard-rust", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Ruby Sinatra notifications service (port 4015). HTTP API queues into
  # redis; the worker (same image, alt command) drains and sends.
  notifications-ruby:
    build:
      context: ./services/notifications-ruby
      dockerfile: Dockerfile
    ports:
      - "4015:4015"
    environment:
      - PORT=4015
      - REDIS_URL=${REDIS_URL:-redis://:leetrank-dev@redis:6379/0}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@leetrank.local}
      - NOTIFICATION_WEBHOOK_URL=${NOTIFICATION_WEBHOOK_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4015/v1/notifications/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  notifications-ruby-worker:
    build:
      context: ./services/notifications-ruby
      dockerfile: Dockerfile
    command: ["bundle", "exec", "ruby", "worker.rb"]
    environment:
      - REDIS_URL=${REDIS_URL:-redis://:leetrank-dev@redis:6379/0}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@leetrank.local}
      - NOTIFICATION_WEBHOOK_URL=${NOTIFICATION_WEBHOOK_URL:-}
    depends_on:
      redis:
        condition: service_healthy
      notifications-ruby:
        condition: service_healthy
    restart: unless-stopped

  # Python FastAPI analytics service (port 4016). Heatmaps, problem stats,
  # contest deltas — heavy reads from pg with numpy post-processing.
  analytics-python:
    build:
      context: ./services/analytics-python
      dockerfile: Dockerfile
    ports:
      - "4016:4016"
    environment:
      - ANALYTICS_PORT=4016
      - DATABASE_URL=${DATABASE_URL:-postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - LOG_LEVEL=info
      - CORS_ALLOWED_ORIGINS=${API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4016/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Go realtime websocket fan-out (port 4017). Subscribes to redis pubsub
  # (verdicts:*, contests:*, problems:*, global) and broadcasts to clients.
  realtime-go:
    build:
      context: ./services/realtime-go
      dockerfile: Dockerfile
    ports:
      - "4017:4017"
    environment:
      - REALTIME_PORT=4017
      - REDIS_URL=${REDIS_URL:-redis://:leetrank-dev@redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CORS_ALLOWED_ORIGINS=${API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/realtime-go", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  judge:
    build:
      context: ./judge-service
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      - RUNNER_TIMEOUT=${RUNNER_TIMEOUT:-5}
      - JUDGE_GLOBAL_MAX=${JUDGE_GLOBAL_MAX:-16}
      - JUDGE_PER_IP_MAX=${JUDGE_PER_IP_MAX:-4}
      - JUDGE_QUEUE_WAIT_MS=${JUDGE_QUEUE_WAIT_MS:-10000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 1g
    cpus: 2.0
    pids_limit: 1024

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-dev@localhost}
      - PUBLIC_HOSTNAME=${PUBLIC_HOSTNAME:-localhost}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  n8n:
    image: n8nio/n8n:1.70.0
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in .env}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  n8n_data:
