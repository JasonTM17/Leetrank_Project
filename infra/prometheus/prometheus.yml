global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: leetrank
    environment: ${ENV:-prod}

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: web
    metrics_path: /api/metrics
    static_configs:
      - targets: ["app:3000"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: identity
    metrics_path: /metrics
    static_configs:
      - targets: ["identity:4011"]

  - job_name: submissions
    metrics_path: /metrics
    static_configs:
      - targets: ["submissions:4012"]

  - job_name: problems
    metrics_path: /metrics
    static_configs:
      - targets: ["problems:4013"]

  - job_name: leaderboard
    metrics_path: /metrics
    static_configs:
      - targets: ["leaderboard-rust:4014"]

  - job_name: notifications
    metrics_path: /metrics
    static_configs:
      - targets: ["notifications-ruby:4015"]

  - job_name: analytics
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-python:4016"]

  - job_name: realtime
    metrics_path: /metrics
    static_configs:
      - targets: ["realtime-go:4017"]

  - job_name: judge
    metrics_path: /metrics
    static_configs:
      - targets: ["judge:9090"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:2019"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
