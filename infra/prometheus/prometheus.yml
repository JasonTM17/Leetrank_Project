global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: leetrank
    environment: ${ENV:-prod}

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: app
    metrics_path: /api/metrics
    static_configs:
      - targets: ["app:3000"]

  - job_name: judge
    metrics_path: /metrics
    static_configs:
      - targets: ["judge:9090"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:2019"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
