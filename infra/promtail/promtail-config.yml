server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all Docker container logs via the Docker socket.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      # Use the container name as the job label.
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: job
      # Carry the container name as a label for filtering in Grafana.
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # Carry the image name.
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # Carry compose project/service labels when present.
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
    pipeline_stages:
      # Parse JSON log lines emitted by the Node.js services.
      - json:
          expressions:
            level: level
            msg: msg
            time: time
      - labels:
          level:
      # Drop noisy health-check lines to reduce storage.
      - drop:
          expression: ".*GET /health.*"
          drop_counter_reason: health_check_noise
