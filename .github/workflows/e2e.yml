name: E2E (Playwright)

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Playwright project to run (chromium-desktop / firefox-desktop / tablet / mobile / all)"
        required: false
        default: "chromium-desktop"
  pull_request:
    paths:
      - "src/**"
      - "playwright.config.ts"
      - "e2e/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leetrank
          POSTGRES_PASSWORD: leetrank-dev
          POSTGRES_DB: leetrank
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leetrank -d leetrank"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://leetrank:leetrank-dev@localhost:5432/leetrank?schema=public"
      JWT_SECRET: "ci-only-secret-32-chars-aaaaaaaa"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma schema
        run: pnpm exec prisma db push --skip-generate

      - name: Seed minimal data
        run: pnpm run db:seed

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium ${{ github.event.inputs.project == 'all' && 'firefox webkit' || '' }}

      - name: Build Next.js
        run: pnpm run build

      - name: Start Next.js
        run: pnpm start &
        env:
          PORT: 3000

      - name: Wait for app
        run: pnpm exec wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright tests
        run: pnpm exec playwright test ${{ github.event.inputs.project != 'all' && format('--project={0}', github.event.inputs.project) || '' }}
        env:
          E2E_BASE_URL: "http://localhost:3000"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload trace + screenshots
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 14
