name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: ci-build-only-secret-32-chars-aaaa

  audit:
    name: Web — npm audit (high)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit (fail on high or critical)
        run: npm audit --audit-level=high

  api:
    name: API — typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install (no lockfile yet — will add when workspace install lands)
        run: npm install --no-package-lock

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx tsc

  auth:
    name: Auth — typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/auth
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install (no lockfile yet — will add when workspace install lands)
        run: npm install --no-package-lock

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx tsc

  judge:
    name: Judge — go vet, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: judge-service
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: judge-service/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race detector)
        run: go test -race -count=1 ./...

  docker:
    name: Docker — image builds
    runs-on: ubuntu-latest
    needs: [web, api, auth, judge]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: leetrank-app:ci

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          tags: leetrank-api:ci

      - name: Build auth image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/auth
          push: false
          tags: leetrank-auth:ci

      - name: Build judge image
        uses: docker/build-push-action@v6
        with:
          context: ./judge-service
          push: false
          tags: leetrank-judge:ci
