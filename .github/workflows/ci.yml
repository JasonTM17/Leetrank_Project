name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Weekly cadence keeps the audit job (and the rest of CI) honest
  # even when the repo is quiet — Mondays 04:00 UTC (~11:00 ICT).
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  web:
    name: Web — typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test (with coverage)
        run: pnpm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@4650159d642e33fdc30954ca22638caf0df6cac8 # v5.4.3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          # Advisory: Codecov upload failures don't block CI; the codecov.yml
          # status check still gates on project/patch 80% when token is set.
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: pnpm run build
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: ci-build-only-secret-32-chars-aaaa

  audit:
    name: Web — pnpm audit (moderate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit (fail on moderate or higher, production deps only)
        run: pnpm audit --prod --audit-level=moderate

  api:
    name: API — typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install (no lockfile yet — will add when workspace install lands)
        run: npm install --no-package-lock

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx tsc

  auth-go:
    name: Auth (Go) — see go-tests matrix
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "auth-go is covered by the go-tests matrix; legacy apps/auth (TS) was retired in ADR 0027"

  judge:
    name: Judge — go vet, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: judge-service
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"

      - name: Vet
        env:
          GOFLAGS: -mod=mod
        run: go vet ./...

      - name: Build
        env:
          GOFLAGS: -mod=mod
        run: go build ./...

      - name: Test (race detector)
        env:
          GOFLAGS: -mod=mod
        run: go test -race -count=1 ./...

  judge-sandbox-tests:
    name: Judge — sandbox-escape suite (nsjail in container)
    runs-on: ubuntu-latest
    needs: [judge]
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      # Build the runtime image so nsjail is present, then run the Go test
      # suite *inside* the image. The sandbox-escape suite refuses to run
      # without nsjail on PATH, so this is the only place it actually
      # exercises the jail.
      - name: Build judge runtime image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./judge-service
          push: false
          load: true
          tags: leetrank-judge:sandbox-tests

      # Pull a Go toolchain alongside the runtime image — easier than
      # building a dedicated test image. We mount the source tree and
      # invoke `go test` with GOFLAGS=-mod=mod so the proxy resolves deps
      # on the fly (consistent with the rest of CI).
      - name: Run sandbox-escape suite
        run: |
          docker run --rm \
            --privileged \
            --user 0:0 \
            -v "$PWD/judge-service:/src" \
            -w /src \
            -e GOFLAGS=-mod=mod \
            --entrypoint /bin/bash \
            leetrank-judge:sandbox-tests \
            -c '
              set -eux
              apt-get update
              apt-get install -y --no-install-recommends golang-1.22-go
              export PATH=/usr/lib/go-1.22/bin:$PATH
              go version
              nsjail --help 2>&1 | head -1 || true
              go test -count=1 -run "Sandbox" -v ./...
            '

  go-tests:
    name: Go services — vet + test (race)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-go, problems-go, submissions-go, realtime-go]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"

      - name: Vet
        env:
          GOFLAGS: -mod=mod
        run: go vet ./...

      - name: Test (race + verbose + count=1)
        env:
          GOFLAGS: -mod=mod
        run: go test -v -race -count=1 ./...

  e2e:
    name: Web — Playwright golden path
    runs-on: ubuntu-latest
    needs: [web]
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci-postgres-pass
          POSTGRES_DB: leetrank_e2e
          POSTGRES_USER: leetrank
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://leetrank:ci-postgres-pass@localhost:5432/leetrank_e2e
      JWT_SECRET: ci-e2e-secret-32-chars-aaaaaaaaa
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3000
      CI: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply schema (postgres)
        run: pnpm exec prisma db push --skip-generate

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Next.js
        run: pnpm run build

      - name: Start app in background
        run: nohup pnpm start > .next-start.log 2>&1 &

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              echo "app is ready"; exit 0
            fi
            sleep 2
          done
          echo "app failed to become ready"
          tail -200 .next-start.log
          exit 1

      - name: Run Playwright golden path
        run: pnpm exec playwright test golden-path.spec.ts --project=chromium-desktop

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  docker:
    name: Docker — image builds
    runs-on: ubuntu-latest
    needs: [web, api, judge]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build app image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: leetrank-app:ci

      - name: Build api image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: leetrank-api:ci

      - name: Build judge image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./judge-service
          push: false
          tags: leetrank-judge:ci
