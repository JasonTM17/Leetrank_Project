name: Container publish (Docker Hub + GHCR)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: .
            dockerfile: Dockerfile
            slug: web
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
            slug: api
          - service: auth
            context: .
            dockerfile: apps/auth/Dockerfile
            slug: auth
          - service: identity
            context: ./services/auth-go
            dockerfile: services/auth-go/Dockerfile
            slug: identity
          - service: submissions
            context: ./services/submissions-go
            dockerfile: services/submissions-go/Dockerfile
            slug: submissions
          - service: problems
            context: ./services/problems-go
            dockerfile: services/problems-go/Dockerfile
            slug: problems
          - service: leaderboard
            context: ./services/leaderboard-rust
            dockerfile: services/leaderboard-rust/Dockerfile
            slug: leaderboard
          - service: notifications
            context: ./services/notifications-ruby
            dockerfile: services/notifications-ruby/Dockerfile
            slug: notifications
          - service: analytics
            context: ./services/analytics-python
            dockerfile: services/analytics-python/Dockerfile
            slug: analytics
          - service: realtime
            context: ./services/realtime-go
            dockerfile: services/realtime-go/Dockerfile
            slug: realtime
          - service: judge
            context: ./judge-service
            dockerfile: judge-service/Dockerfile
            slug: judge

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags (dual registry)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            nguyenson1710/leetrank-${{ matrix.slug }}
            ghcr.io/jasontm17/leetrank-${{ matrix.slug }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (Docker Hub + GHCR)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

      - name: Verify image tag landed on Docker Hub
        run: docker manifest inspect nguyenson1710/leetrank-${{ matrix.slug }}:latest

      - name: Verify image tag landed on GHCR
        run: docker manifest inspect ghcr.io/jasontm17/leetrank-${{ matrix.slug }}:latest

      # Note: peter-evans/dockerhub-description was removed — the access
      # token used by CI doesn't carry the legacy "Repository Admin"
      # scope required to update repo descriptions, and the new fine-
      # grained scope model needs a separate password-based login.
      # Update descriptions manually on Docker Hub when needed.
