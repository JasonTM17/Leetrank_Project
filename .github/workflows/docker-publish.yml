name: Docker Hub publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: app
            context: .
            dockerfile: Dockerfile
            image: nguyenson1710/leetrank-app
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
            image: nguyenson1710/leetrank-api
          - service: auth
            context: .
            dockerfile: apps/auth/Dockerfile
            image: nguyenson1710/leetrank-auth
          - service: auth-go
            context: ./services/auth-go
            dockerfile: services/auth-go/Dockerfile
            image: nguyenson1710/leetrank-auth-go
          - service: judge
            context: ./judge-service
            dockerfile: judge-service/Dockerfile
            image: nguyenson1710/leetrank-judge
          - service: submissions-go
            context: ./services/submissions-go
            dockerfile: services/submissions-go/Dockerfile
            image: nguyenson1710/leetrank-submissions-go
          - service: problems-go
            context: ./services/problems-go
            dockerfile: services/problems-go/Dockerfile
            image: nguyenson1710/leetrank-problems-go

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

      - name: Verify image tag landed on Docker Hub
        run: docker manifest inspect ${{ matrix.image }}:latest

      # Note: peter-evans/dockerhub-description was removed — the access
      # token used by CI doesn't carry the legacy "Repository Admin"
      # scope required to update repo descriptions, and the new fine-
      # grained scope model needs a separate password-based login.
      # Update descriptions manually on Docker Hub when needed.
