name: Container publish (Docker Hub + GHCR)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    continue-on-error: true

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - service: web
            context: .
            dockerfile: Dockerfile
            slug: web
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
            slug: api
          - service: identity
            context: ./services/auth-go
            dockerfile: services/auth-go/Dockerfile
            slug: identity
          - service: submissions
            context: ./services/submissions-go
            dockerfile: services/submissions-go/Dockerfile
            slug: submissions
          - service: problems
            context: ./services/problems-go
            dockerfile: services/problems-go/Dockerfile
            slug: problems
          - service: leaderboard
            context: ./services/leaderboard-rust
            dockerfile: services/leaderboard-rust/Dockerfile
            slug: leaderboard
          - service: notifications
            context: ./services/notifications-ruby
            dockerfile: services/notifications-ruby/Dockerfile
            slug: notifications
          - service: analytics
            context: ./services/analytics-python
            dockerfile: services/analytics-python/Dockerfile
            slug: analytics
          - service: realtime
            context: ./services/realtime-go
            dockerfile: services/realtime-go/Dockerfile
            slug: realtime
          - service: judge
            context: ./judge-service
            dockerfile: judge-service/Dockerfile
            slug: judge

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Login to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags (dual registry)
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: |
            nguyenson1710/leetrank-${{ matrix.slug }}
            ghcr.io/jasontm17/leetrank-${{ matrix.slug }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (Docker Hub + GHCR)
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

      # Retry the build once on transient registry failures (Docker Hub
      # 429 toomanyrequests is the most common cause of false-red on this
      # workflow — see ADR 0026). Sleep 90s first so the rate-limit window
      # has time to drain.
      - name: Sleep before retry
        if: ${{ always() && steps.build-push.outcome == 'failure' }}
        run: sleep 90

      - name: Build & push retry (after transient failure)
        if: ${{ always() && steps.build-push.outcome == 'failure' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

      - name: Verify image tag landed on Docker Hub
        run: docker manifest inspect nguyenson1710/leetrank-${{ matrix.slug }}:latest

      - name: Verify image tag landed on GHCR
        run: docker manifest inspect ghcr.io/jasontm17/leetrank-${{ matrix.slug }}:latest

      # Note: peter-evans/dockerhub-description was removed — the access
      # token used by CI doesn't carry the legacy "Repository Admin"
      # scope required to update repo descriptions, and the new fine-
      # grained scope model needs a separate password-based login.
      # Update descriptions manually on Docker Hub when needed.
