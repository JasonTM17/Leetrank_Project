name: Trivy security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 3 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  filesystem:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: 'trivy-fs'

  images:
    name: Trivy image scan — ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - nguyenson1710/leetrank-app:latest
          - nguyenson1710/leetrank-api:latest
          - nguyenson1710/leetrank-identity:latest
          - nguyenson1710/leetrank-judge:latest
          - nguyenson1710/leetrank-submissions-go:latest
          - nguyenson1710/leetrank-problems-go:latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ matrix.image }}
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: 'trivy-${{ matrix.image }}'
