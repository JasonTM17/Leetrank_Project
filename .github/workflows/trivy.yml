name: Trivy security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 3 * * 2"

permissions:
  contents: read
  security-events: write

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  filesystem:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          sarif_file: trivy-fs.sarif
          category: "trivy-fs"

  images:
    name: Trivy image scan — ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - nguyenson1710/leetrank-app:latest
          - nguyenson1710/leetrank-api:latest
          - nguyenson1710/leetrank-identity:latest
          - nguyenson1710/leetrank-judge:latest
          - nguyenson1710/leetrank-submissions-go:latest
          - nguyenson1710/leetrank-problems-go:latest
          - nguyenson1710/leetrank-leaderboard:latest
          - nguyenson1710/leetrank-notifications:latest
          - nguyenson1710/leetrank-analytics:latest
          - nguyenson1710/leetrank-realtime:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          sarif_file: trivy-image.sarif
          category: "trivy-${{ matrix.image }}"
