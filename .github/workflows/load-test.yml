name: Load Test (manual)

# Manual trigger only — not run on every PR.
# See docs/load-testing.md for usage instructions.
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to run (smoke | stress | contest-storm)"
        required: false
        default: "smoke"
        type: choice
        options:
          - smoke
          - stress
          - contest-storm
      duration:
        description: "Override duration in seconds (0 = use scenario default)"
        required: false
        default: "0"

permissions:
  contents: read

concurrency:
  group: load-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-test:
    name: Load Test — ${{ inputs.scenario }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Node (root workspace — pnpm) ──────────────────────────────────
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      # ── Boot API + Postgres via docker compose ─────────────────────────────
      - name: Start services (api + postgres)
        run: |
          docker compose up -d postgres api
        env:
          JWT_SECRET: load-test-ci-secret-32-chars-aaaa
          DATABASE_URL: postgresql://leetrank:leetrank-dev@localhost:5432/leetrank?schema=public

      - name: Wait for Postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U leetrank -d leetrank && break
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health && break
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      # ── Seed 1 k problems + users ──────────────────────────────────────────
      - name: Seed database (1k)
        run: pnpm run seed:1k
        env:
          DATABASE_URL: postgresql://leetrank:leetrank-dev@localhost:5432/leetrank?schema=public

      # ── Run the load test ──────────────────────────────────────────────────
      - name: Run load test
        run: |
          DURATION_FLAG=""
          if [ "${{ inputs.duration }}" != "0" ]; then
            DURATION_FLAG="--duration ${{ inputs.duration }}"
          fi
          node scripts/load-test.mjs \
            --target http://localhost:4000 \
            --scenario ${{ inputs.scenario }} \
            $DURATION_FLAG
        env:
          # Ensure colour codes are stripped in CI logs
          NO_COLOR: "1"

      # ── Upload results JSON as a workflow artifact ─────────────────────────
      - name: Upload load-test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: load-test-results-${{ inputs.scenario }}-${{ github.run_id }}
          path: load-test-results/
          retention-days: 30

      # ── Tear down containers ───────────────────────────────────────────────
      - name: Stop services
        if: always()
        run: docker compose down -v
