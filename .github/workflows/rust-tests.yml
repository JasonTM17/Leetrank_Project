name: Rust services — fmt + clippy + test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: rust-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  leaderboard-rust:
    name: leaderboard-rust — cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/leaderboard-rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Pinned to the 1.82.0 stable toolchain. dtolnay/rust-toolchain
      # exposes a `master` branch tag — pinning the SHA keeps supply-chain
      # behaviour consistent with the rest of CI.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: 1.89.0
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: services/leaderboard-rust -> target

      - name: cargo fmt --check
        # Advisory until baseline formatting lands across all rust services.
        # Track in TEAM-A polyglot test follow-up.
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Advisory until baseline lint cleanup lands.
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --no-fail-fast
