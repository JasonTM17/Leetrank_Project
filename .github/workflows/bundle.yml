name: Bundle size

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle:
    name: Next.js bundle stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: ci-build-only-secret-32-chars-aaaa

      - name: Report bundle
        run: |
          echo "## Next.js bundle report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh .next/static/chunks/*.js 2>/dev/null | sort -h | tail -25 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
