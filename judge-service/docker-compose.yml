version: "3.9"

services:
  judge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leetrank-judge
    ports:
      - "9090:9090"
    environment:
      JUDGE_PORT: "9090"
      RUNNER_TIMEOUT: "5"
      RUNNER_MEMORY_MB: "128"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Limit container resources.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M
