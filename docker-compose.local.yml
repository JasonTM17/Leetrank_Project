# Local-only override to remap ports so LeetRank can boot beside other
# Docker projects on the same host. The `!override` tag tells Compose to
# REPLACE the parent ports list rather than merge (Compose v2.24+).
#
# Also overrides DATABASE_URL because the user's .env keeps the legacy
# SQLite URL ("file:./dev.db") for the app's local Prisma Studio path.
# Containers MUST hit the postgres service over the docker network — point
# them at it explicitly so the .env value never reaches the inside.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml \
#     up -d --build postgres redis app api identity judge
#
# Then open: http://localhost:13000 (app), :14000 (api), :14011 (identity),
# :19090 (judge). Internals: postgres :15432, redis :16379.

x-postgres-url: &postgres-url
  DATABASE_URL: postgresql://leetrank:leetrank-dev@postgres:5432/leetrank?schema=public

services:
  postgres:
    ports: !override
      - "15432:5432"

  redis:
    ports: !override
      - "16379:6379"

  web:
    ports: !override
      - "13000:3000"
    environment:
      <<: *postgres-url

  api:
    ports: !override
      - "14000:4000"
    environment:
      <<: *postgres-url

  identity:
    ports: !override
      - "14011:4011"
    environment:
      <<: *postgres-url

  judge:
    ports: !override
      - "19090:9090"

  submissions:
    ports: !override
      - "14012:4012"
    environment:
      <<: *postgres-url

  problems:
    ports: !override
      - "14013:4013"
    environment:
      <<: *postgres-url

  leaderboard-rust:
    ports: !override
      - "14014:4014"
    environment:
      <<: *postgres-url

  notifications-ruby:
    ports: !override
      - "14015:4015"

  analytics-python:
    ports: !override
      - "14016:4016"
    environment:
      <<: *postgres-url

  realtime-go:
    ports: !override
      - "14017:4017"
